name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx expo export -p web
      - run: sed -i 's|src="/_expo/|src="/imrf-2026-scheduler/_expo/|g' dist/index.html
      - name: Patch index.html for Safari PWA icon and name
        run: |
          python3 - <<'PYEOF'
          with open('dist/index.html', 'r') as f:
              html = f.read()
          tags = (
              '<link rel="apple-touch-icon" href="/imrf-2026-scheduler/icons/apple-touch-icon.png">\n'
              '    <meta name="apple-mobile-web-app-capable" content="yes">\n'
              '    <meta name="apple-mobile-web-app-title" content="IMRF 2026">\n'
              '    <meta name="apple-mobile-web-app-status-bar-style" content="default">\n'
          )
          html = html.replace('</head>', tags + '</head>')
          with open('dist/index.html', 'w') as f:
              f.write(html)
          print('Safari PWA tags injected')
          PYEOF
      - name: Inject PWA icons into manifest
        run: |
          python3 - <<'PYEOF'
          import json, os
          path = 'dist/manifest.json'
          if os.path.exists(path):
              with open(path) as f:
                  m = json.load(f)
              m['icons'] = [
                  {"src": "/imrf-2026-scheduler/icons/icon-192.png", "sizes": "192x192", "type": "image/png"},
                  {"src": "/imrf-2026-scheduler/icons/icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}
              ]
              with open(path, 'w') as f:
                  json.dump(m, f, indent=2)
              print('Icons injected into manifest.json')
          else:
              print('manifest.json not found, skipping')
          PYEOF
      - name: Build Jekyll docs
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./dist/docs
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
